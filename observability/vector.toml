# Vector config — collect Docker logs, forward to VictoriaLogs
# Docs: https://vector.dev/docs/reference/configuration/

[sources.docker_logs]
type = "docker_logs"

[transforms.parse]
type = "remap"
inputs = ["docker_logs"]
source = '''
.timestamp = now()
'''

[sinks.victorialogs]
type = "http"
inputs = ["parse"]
uri = "http://victorialogs:9428/insert/jsonline?_stream_fields=container_name"
encoding.codec = "json"
