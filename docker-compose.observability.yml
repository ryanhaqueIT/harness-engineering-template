# Local observability stack — VictoriaMetrics + VictoriaLogs + Vector
#
# The same stack OpenAI runs (VictoriaMetrics blog, Feb 2026).
# Single-node versions — no cluster overhead for local dev.
#
# Usage:
#   docker compose -f docker-compose.observability.yml up -d
#   # Metrics: http://localhost:8428 (PromQL)
#   # Logs:    http://localhost:9428 (LogsQL)
#
# Tear down:
#   docker compose -f docker-compose.observability.yml down

services:
  victoriametrics:
    image: victoriametrics/victoria-metrics:latest
    ports:
      - "8428:8428"
    volumes:
      - vm_data:/storage
    command:
      - -storageDataPath=/storage
      - -retentionPeriod=7d

  victorialogs:
    image: victoriametrics/victoria-logs:latest
    ports:
      - "9428:9428"
    volumes:
      - vl_data:/vlogs
    command:
      - -storageDataPath=/vlogs
      - -retentionPeriod=7d

  vector:
    image: timberio/vector:latest-alpine
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./observability/vector.toml:/etc/vector/vector.toml:ro
    depends_on:
      - victorialogs

volumes:
  vm_data:
  vl_data:
